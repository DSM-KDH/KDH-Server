name: Java CD with Docker

on:
  push:
    branches: [ "main" ]  # 메인 브랜치에 푸시하면 배포 시작

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17  # 본인 프로젝트 자바 버전으로 수정 (11, 17, 21 등)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Gradle 빌드 (테스트 제외하고 빌드 속도 업)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # Docker 빌드 및 푸시
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker build & push
        run: |
          # 이미지 태그를 'kdh'로 설정 (이미지 이름은 자유롭게 수정 가능)
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-spring-app:kdh .
          docker push ${{ secrets.DOCKER_USERNAME }}/my-spring-app:kdh

# 우분투 서버에 접속해서 .env 파일 생성 후 도커 실행
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            # 1. 기존 폴더로 이동 (없으면 생성)
            mkdir -p ~/app
            cd ~/app

            # 2. SERVER_ENV 내용을 .env 파일로 저장
            echo "${{ secrets.SERVER_ENV }}" > .env

            # 3. 기존 컨테이너 정리
            docker stop my-spring-app || true
            docker rm my-spring-app || true

            # 4. 최신 이미지 풀
            docker pull ${{ secrets.DOCKER_USERNAME }}/my-spring-app:kdh

            # 5. --env-file 옵션으로 .env 파일 전체 적용해서 실행
            docker run -d -p 8080:8080 --name my-spring-app \
              --env-file .env \
              ${{ secrets.DOCKER_USERNAME }}/my-spring-app:kdh
            
            # 6. Health Check (최대 2분 동안 3초 간격으로 확인)
            echo "Starting health check for Swagger UI..."
            MAX_RETRIES=40  # 40번 * 3초 = 120초(2분)
            RETRY_COUNT=0
            HEALTH_URL="http://localhost:8080/swagger-ui/index.html"

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              # HTTP 상태 코드가 200인지 확인
              HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" $HEALTH_URL)
              
              if [ "$HTTP_STATUS" -eq 200 ]; then
                echo "Successfully deployed! Swagger UI is up."
                exit 0
              fi

              echo "Waiting for server... (Attempt: $((RETRY_COUNT+1))/$MAX_RETRIES)"
              RETRY_COUNT=$((RETRY_COUNT+1))
              sleep 3
            done

            echo "Health check failed after 2 minutes."
            docker logs my-spring-app  # 실패 시 원인 파악을 위해 로그 출력
            exit 1

            # 7. 사용하지 않는 이미지 정리 (Health check 성공 시 실행되도록 위치 조정 가능)
            docker image prune -f
